<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laraps</title>

    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/circle.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- ── HEADER ── -->
    <header>
        <h1 class="logo">Laraps</h1>
        <nav>
            <a href="#sobre">Sobre Mim</a>
            <a href="#musicas">Músicas</a>
            <a href="#redes">Redes Sociais</a>
        </nav>
    </header>

    <!-- ── CÍRCULO → CARD  (antes do banner) ── -->
    <!--
        ATENÇÃO: troque image.png pelo caminho da sua foto/logo
        e image1.png pela imagem que aparece ao passar o mouse.
        Exemplo: src="./images/minha-foto.png"
    -->
    <section class="hero-section">

        <div class="heart-animation">
            <canvas id="heartCanvas" width="320" height="320"></canvas>
        </div>

        <div class="circle-card">
            <div class="circle">
                <img src="./images/banner2.jpeg" alt="Logo" class="circle-logo">
            </div>
            <img src="./images/banner3.jpeg" alt="Produto" class="product_img">
            <div class="content">
                <h2>Laraps</h2>
                <p>Escreva aqui uma frase sobre você ou seu projeto musical!</p>
                <a href="https://youtu.be/zI4DS5GmQWE?si=h48mm7AtcTH7v0dO">Youtube</a>
            </div>
        </div>
    </section>

    <!-- ── BANNER / SLIDER ── -->
    <section class="banner">
        <div class="slider">
            <img src="./images/WhatsApp Image 2026-05-19 at 22.34.14.jpeg" alt="Banner 1">
            <img src="./images/banner2.jpeg" alt="Banner 2">
            <img src="./images/banner3.jpeg" alt="Banner 3">
        </div>
    </section>

    <!-- ── SOBRE MIM ── -->
    <section id="sobre">
        <h2>Sobre Mim</h2>
        <p>Escreva aqui sobre você.</p>
    </section>

    <!-- ── MÚSICAS ── -->
    <section id="musicas">
        <h2>Músicas</h2>
        <div class="cards">
            <div class="card-album">Álbum 1</div>
            <div class="card-album">Álbum 2</div>
            <div class="card-album">Álbum 3</div>
        </div>
    </section>

    <!-- ── REDES SOCIAIS ── -->
    <section id="redes">
        <h2>Redes Sociais</h2>
        <div class="icons">
            <a href=""><i class="fa-brands fa-instagram"></i></a>
            <a href=""><i class="fa-brands fa-youtube"></i></a>
            <a href=""><i class="fa-brands fa-tiktok"></i></a>
        </div>
    </section>

    <!-- ── FOOTER ── -->
    <footer>
        © 2026 Laraps
    </footer>

    <script>
    (function () {
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        const W = 320, H = 320;
        const CX = W/2, CY = H/2 + 20;

        function insideHeart(px, py) {
            const x = (px - CX) / 90;
            const y = -(py - CY) / 80;
            return Math.pow(x*x + y*y - 1, 3) - x*x * y*y*y < 0;
        }

        const pts = [];
        let tries = 0;
        while (pts.length < 150 && tries < 30000) {
            tries++;
            const px = 20 + Math.random() * (W - 40);
            const py = 20 + Math.random() * (H - 40);
            if (!insideHeart(px, py)) continue;
            pts.push({
                px, py,
                size:  7 + Math.random() * 10,
                angle: (Math.random() - 0.5) * 0.5,
                base:  0.4 + Math.random() * 0.6,
                speed: 0.007 + Math.random() * 0.02,
                phase: Math.random() * Math.PI * 2,
                text:  Math.random() > 0.2 ? 'i love you' : 'Love you.',
            });
        }

        function animate() {
            ctx.clearRect(0, 0, W, H);
            pts.forEach(p => {
                p.phase += p.speed;
                const pulse = 0.5 + 0.5 * Math.sin(p.phase);
                const r = Math.floor(200 + 55 * pulse);
                const g = Math.floor(10 + 30 * pulse);
                const b = Math.floor(60 + 80 * pulse);
                ctx.save();
                ctx.translate(p.px, p.py);
                ctx.rotate(p.angle);
                ctx.globalAlpha = p.base * (0.4 + 0.6 * pulse);
                ctx.font = `bold ${p.size}px 'Poppins', Arial`;
                ctx.fillStyle = `rgb(${r},${g},${b})`;
                ctx.shadowColor = `rgba(255,20,80,${0.8 * pulse})`;
                ctx.shadowBlur = 10 + pulse * 15;
                ctx.fillText(p.text, 0, 0);
                ctx.restore();
            });
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    })();
    </script>

</body>
</html>
